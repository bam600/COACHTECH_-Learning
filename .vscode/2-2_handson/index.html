<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>自己紹介</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="profile-card">
      <h1>笹沼 禅</h1>
      <img
        src="images/image.png"
        alt="笹沼 禅のプロフィール写真"
        class="profile-image"
        width="150"
      />
      <div class="intro">
        <h2>Webエンジニア</h2>
        <p>東京都在住</p>
        <p>
          こんにちは！Laravelとvue.jsを使った開発が得意なWebエンジニアです。最近はフロントエンドのモダンな技術、特にReactとNext.jsを学習しています。
        </p>
        <p>趣味は週末のキャンプとコーヒーを淹れることです。</p>
      </div>
      <div class="social-section">
        <h2>SNS & Links</h2>
        <ul class="social-links">
          <li>
            <a href="https://github.com/your-account" target="_blank">GitHub</a>
          </li>
          <li>
            <a href="https://twitter.com/your-account" target="_blank"
              >Twitter</a
            >
          </li>
          <li><a href="https://your-blog.com" target="_blank">ブログ</a></li>
        </ul>
      </div>
    </div>
  </body>
</html>
